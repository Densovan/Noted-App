version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: notes-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: NotesDb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notes-backend
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=NotesDb;Username=postgres;Password=postgres
      - Jwt__Key=a_very_long_secret_key_with_at_least_32_characters
      - Jwt__Issuer=NotesApp
      - Jwt__Audience=NotesApp
    depends_on:
      db:
        condition: service_healthy
